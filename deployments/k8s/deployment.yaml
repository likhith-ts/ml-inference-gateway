---
# Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference-gateway
  labels:
    app: ml-inference-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-inference-gateway
  template:
    metadata:
      labels:
        app: ml-inference-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2112"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: ml-inference-gateway:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-workers=ml-worker-service:50052"
            - "-grpc-addr=:50051"
            - "-http-addr=:8080"
            - "-metrics-addr=:2112"
            - "-health-interval=5s"
            - "-batch-window=10ms"
            - "-max-batch=8"
            - "-queue-capacity=512"
          ports:
            - name: grpc
              containerPort: 50051
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 2112
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
# Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: ml-inference-gateway-service
  labels:
    app: ml-inference-gateway
spec:
  selector:
    app: ml-inference-gateway
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 2112
      targetPort: metrics
  type: ClusterIP
---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-inference-worker
  labels:
    app: ml-inference-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-inference-worker
  template:
    metadata:
      labels:
        app: ml-inference-worker
    spec:
      containers:
        - name: worker
          image: ml-inference-worker:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--port"
            - "50052"
            - "--worker-id"
            - "$(POD_NAME)"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: grpc
              containerPort: 50052
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
# Worker Service (headless for direct pod addressing)
apiVersion: v1
kind: Service
metadata:
  name: ml-worker-service
  labels:
    app: ml-inference-worker
spec:
  selector:
    app: ml-inference-worker
  ports:
    - name: grpc
      port: 50052
      targetPort: grpc
  type: ClusterIP
---
# Horizontal Pod Autoscaler for workers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-inference-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-inference-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
